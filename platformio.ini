; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp12e
extra_configs = 
	app_default_settings.ini
	app_secrets_empty.ini
	app_secrets.ini

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
build_flags = 
	${app_default_settings.build_flags}
	${app_secrets.build_flags}
custom_ap_pwd_length = 20
extra_scripts = 
	pre:scripts/install_python_dependencies.py
	pre:scripts/generate_app_secrets.py
	pre:scripts/build_web_interface.py

[env:esp12e]
platform = espressif8266
board = esp12e
lib_deps = 
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
	esp32async/ESPAsyncWebServer@^3.10.3
	esp32async/ESPAsyncTCP@^2.0.0
	bogde/HX711@^0.7.5
	bblanchon/ArduinoJson @ ^7.4.3
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit SH110X@^2.1.14
